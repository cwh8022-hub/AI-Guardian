<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 30秒椅子站立檢測</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

  <style>
    :root { --bg-color: #1a1a2e; --accent-blue: #00d2ff; --accent-green: #2ecc71; }
    body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: white; margin: 0; padding: 15px; text-align: center; }
    .timer-display { font-size: 55px; color: #f1c40f; font-weight: bold; margin: 5px 0; }
    .count-display { font-size: 30px; color: var(--accent-blue); margin-bottom: 15px; }

    /* 原生影片與 AI 畫布疊合區 */
    #video-container {
      width: 260px; height: 260px; border-radius: 20px; background: #000;
      overflow: hidden; position: relative; margin: 0 auto 15px;
      border: 2px solid rgba(0, 210, 255, 0.5); box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
    }
    #raw-video, #overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    #overlay-canvas { z-index: 2; }

    .name-input {
      width: 80%; max-width: 300px; padding: 12px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1); color: white; text-align: center; margin-bottom: 15px; font-size: 16px;
    }

    .action-btn { width: 85%; max-width: 300px; padding: 16px; border-radius: 50px; border: none; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin: 8px 0; }
    #btn-init { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); }
    #btn-start { background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); display: none; }
    #status { font-size: 14px; color: var(--accent-blue); margin-top: 10px; min-height: 40px; font-weight: bold;}
    
    #debug-log { display: none; background: rgba(255,0,0,0.2); color: #ff7675; padding: 10px; border-radius: 10px; font-size: 12px; text-align: left; word-break: break-all; margin-top: 15px; border: 1px solid #ff7675; }
  </style>
</head>
<body>

  <h2 style="margin-top:5px; color:#fff;">🪑 30秒椅子站立檢測</h2>
  
  <div class="timer-display" id="timer">30.0</div>
  <div class="count-display">完成次數：<span id="count-val">0</span></div>
  
  <div id="video-container">
    <video id="raw-video" playsinline autoplay muted></video>
    <canvas id="overlay-canvas"></canvas>
  </div>
  
  <input type="text" id="p-name" class="name-input" placeholder="👤 輸入受測長者姓名">
  <div id="status">準備就緒，請點擊啟動</div>

  <button id="btn-init" class="action-btn" onclick="init()">🔵 1. 啟動 AI 相機</button>
  <button id="btn-start" class="action-btn" onclick="startTest()">🟢 2. 開始測驗</button>

  <div id="debug-log"></div>

<script>
  const MODEL_URL = "https://teachablemachine.withgoogle.com/models/m5xSQ1Ixr/";
  const GAS_URL = "https://script.google.com/macros/s/AKfycby8s6DKAGqcZqk9_cUyCC-L_vx90AkWX380JZeFXfYLyTG9HWz2yNnBf_JKQ2jR9Gu5/exec";
  
  let model, video, canvas, ctx;
  let count = 0, isTesting = false, hasStoodUp = false, sec = 30.0;
  
  // ==========================================
  // 🔧 靈敏度調整區 (現場測試可微調這裡)
  // ==========================================
  const standThreshold = 0.85; // 站立的最低信心值 (預設 85%)
  const sitThreshold = 0.80;   // 坐下的最低信心值 (預設 80%)
  const requiredFrames = 4;    // 必須連續維持幾幀才算數 (防手震/防雜訊)
  // ==========================================
  
  let standFrameCounter = 0;
  let sitFrameCounter = 0;

  function logError(msg, err) {
    const debugBox = document.getElementById("debug-log");
    debugBox.style.display = "block";
    debugBox.innerHTML += `<strong>${msg}</strong><br>${err.name || 'Error'}: ${err.message || err}<br><br>`;
  }

  async function init() {
    const status = document.getElementById("status");
    const btn = document.getElementById("btn-init");
    btn.innerHTML = "⌛ 載入中...";
    btn.disabled = true;
    document.getElementById("debug-log").innerHTML = "";

    try {
      video = document.getElementById("raw-video");
      status.innerText = "1/2 啟動相機中...";
      
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
      } catch (e1) {
        logError("後置鏡頭啟動失敗，嘗試備用鏡頭", e1);
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        } catch (e2) {
          throw new Error("相機權限被拒絕 (" + e2.name + ")");
        }
      }
      
      video.srcObject = stream;
      await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });

      status.innerText = "2/2 下載 AI 骨架模型中...";
      model = await tmPose.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
      
      canvas = document.getElementById("overlay-canvas");
      canvas.width = video.videoWidth || 260;
      canvas.height = video.videoHeight || 260;
      ctx = canvas.getContext("2d");

      btn.style.display = "none";
      document.getElementById("btn-start").style.display = "inline-block";
      status.innerText = "✅ 系統就緒：請將鏡頭對準受測者正面";
      status.style.color = "#2ecc71";
      
      window.requestAnimationFrame(loop);
    } catch (err) {
      status.innerHTML = `❌ 失敗: 請確認已允許 Safari 相機權限。`;
      logError("系統錯誤", err);
      btn.disabled = false; btn.innerHTML = "重試啟動";
    }
  }

  async function loop() {
    if (video.readyState >= 2 && model) {
      await predict();
    }
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const { pose, posenetOutput } = await model.estimatePose(video);
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (pose) {
      tmPose.drawKeypoints(pose.keypoints, 0.5, ctx);
      tmPose.drawSkeleton(pose.keypoints, 0.5, ctx);

      const prediction = await model.predict(posenetOutput);
      let standProb = prediction.find(p => p.className.includes("站"))?.probability || 0;
      let sitProb = prediction.find(p => p.className.includes("坐"))?.probability || 0;

      if (isTesting) {
        // 站立狀態機邏輯 (加入連續幀數判斷)
        if (standProb > standThreshold) {
          standFrameCounter++;
          if (standFrameCounter >= requiredFrames && !hasStoodUp) {
            hasStoodUp = true;
            document.getElementById("status").innerText = "⬆️ 已起身，請引導坐下";
          }
        } else {
          standFrameCounter = 0; // 一旦動作中斷，計數器歸零
        }

        // 坐下狀態機邏輯 (加入連續幀數判斷)
        if (sitProb > sitThreshold) {
          sitFrameCounter++;
          if (sitFrameCounter >= requiredFrames && hasStoodUp) {
            count++;
            document.getElementById("count-val").innerText = count;
            hasStoodUp = false;
            sitFrameCounter = 0; // 完成一次計數，歸零
            document.getElementById("status").innerText = "⬇️ 已坐下，次數 +1";
          }
        } else {
          sitFrameCounter = 0;
        }
      }
    }
  }

  function startTest() {
    const name = document.getElementById("p-name").value;
    if (!name) return alert("請先輸入長者姓名");
    
    isTesting = true; count = 0; sec = 30.0; hasStoodUp = false;
    standFrameCounter = 0; sitFrameCounter = 0;
    
    document.getElementById("btn-start").disabled = true;
    document.getElementById("p-name").disabled = true;
    document.getElementById("status").innerText = "⏱️ 測驗進行中...";
    document.getElementById("count-val").innerText = "0";

    const timerIdx = setInterval(() => {
      sec -= 0.1;
      document.getElementById("timer").innerText = sec.toFixed(1);
      if (sec <= 0) {
        clearInterval(timerIdx);
        isTesting = false;
        saveData(name, count);
      }
    }, 100);
  }

  function saveData(name, c) {
    document.getElementById("status").innerText = "💾 正在傳送資料至雲端...";
    
    const requestUrl = `${GAS_URL}?type=chair&name=${encodeURIComponent(name)}&count=${c}`;
    
    fetch(requestUrl, { mode: 'no-cors' })
      .then(() => {
        alert(`測驗結束！\n${name} 共完成 ${c} 次。\n資料已成功送往雲端試算表。`);
        location.reload(); 
      })
      .catch(error => {
        alert("傳送可能有問題，請檢查網路。");
        document.getElementById("status").innerText = "❌ 傳送失敗";
      });
  }
</script>
</body>
</html>
