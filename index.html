<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>淡水河 AI 守護者</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; padding: 15px; }
    h2 { color: #00d2ff; margin-top: 10px; margin-bottom: 5px; }
    
    #video-container { 
      width: 280px; height: 280px; margin: 15px auto; border-radius: 20px; 
      overflow: hidden; border: 3px solid #2ecc71; background: #000; 
      position: relative;
    }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    .action-btn { width: 90%; max-width: 300px; padding: 18px; border-radius: 50px; border: none; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin: 8px 0; }
    #btn-init { background: #3498db; }
    #btn-save { background: #e74c3c; display: none; }
    
    #status { font-size: 16px; color: #f1c40f; font-weight: bold; margin: 10px 0; min-height: 25px; }
    #label-container { font-size: 22px; color: white; font-weight: bold; margin-bottom: 10px; }
    
    /* 專門用來抓蟲的除錯面板，只在錯誤時顯示 */
    #debug-log { 
      display: none; background: rgba(255,0,0,0.2); color: #ff7675; 
      padding: 10px; border-radius: 10px; font-size: 12px; text-align: left; 
      word-break: break-all; margin-top: 15px; border: 1px solid #ff7675;
    }
  </style>
</head>
<body>

  <h2>🌊 淡水河 AI 守護者</h2>
  <div id="status">系統就緒，點擊啟動</div>

  <div id="video-container">
    <video id="raw-video" playsinline autoplay muted></video>
  </div>
  
  <div id="label-container">等待掃描...</div>

  <button id="btn-init" class="action-btn" onclick="init()">📸 1. 啟動環境掃描鏡頭</button>
  <button id="btn-save" class="action-btn" onclick="triggerSave()">🚨 2. 紀錄目前畫面垃圾</button>

  <div id="debug-log"></div>

<script>
  // 🔴 老師，請把這裡換成您的淡水河模型網址！
  const MODEL_URL = "https://teachablemachine.withgoogle.com/models/eCgKCPgbq/";
  
  // 您的專屬 GAS API
  const GAS_URL = "https://script.google.com/macros/s/AKfycby8s6DKAGqcZqk9_cUyCC-L_vx90AkWX380JZeFXfYLyTG9HWz2yNnBf_JKQ2jR9Gu5/exec";
  
  let model, video;
  let currentLabel = "", currentScore = 0;

  function logError(msg, err) {
    const debugBox = document.getElementById("debug-log");
    debugBox.style.display = "block";
    debugBox.innerHTML += `<strong>${msg}</strong><br>${err.name || 'Error'}: ${err.message || err}<br><br>`;
    console.error(msg, err);
  }

  async function init() {
    const status = document.getElementById("status");
    const btnInit = document.getElementById("btn-init");
    btnInit.innerHTML = "啟動中...";
    btnInit.disabled = true;
    document.getElementById("debug-log").innerHTML = ""; // 清空舊錯誤

    try {
      video = document.getElementById("raw-video");
      status.innerText = "1/2 啟動鏡頭中...";
      
      let stream;
      try {
        // 第一志願：嘗試開啟後置主鏡頭
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
      } catch (camErr1) {
        logError("後置鏡頭失敗，嘗試切換備用鏡頭...", camErr1);
        try {
          // 第二志願：如果後鏡頭被 iOS 擋住，退而求其次，隨便給個鏡頭就好
          stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        } catch (camErr2) {
          throw new Error("所有鏡頭皆無法開啟 (" + camErr2.name + ")");
        }
      }
      
      video.srcObject = stream;
      await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });

      status.innerText = "2/2 下載 AI 模型中...";
      try {
        model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
      } catch (modelErr) {
        throw new Error("AI 模型載入失敗，請檢查網址 (" + modelErr.message + ")");
      }

      btnInit.style.display = "none";
      document.getElementById("btn-save").style.display = "inline-block";
      status.innerText = "✅ 掃描中，請對準垃圾";
      status.style.color = "#2ecc71";
      
      window.requestAnimationFrame(loop);

    } catch (finalErr) {
      status.innerHTML = `<span style="color:#ff4d4d">❌ 啟動失敗</span>`;
      logError("最終崩潰原因", finalErr);
      btnInit.disabled = false;
      btnInit.innerHTML = "重新嘗試啟動";
    }
  }

  async function loop() {
    if (video.readyState >= 2 && model) {
      try {
        const prediction = await model.predict(video);
        let best = prediction.reduce((a, b) => a.probability > b.probability ? a : b);
        
        currentLabel = best.className;
        currentScore = best.probability.toFixed(2);
        document.getElementById("label-container").innerText = `${currentLabel} (${(currentScore * 100).toFixed(0)}%)`;
      } catch(e) {} // 忽略畫面閃爍時的微小錯誤
    }
    window.requestAnimationFrame(loop);
  }

  function triggerSave() {
    if (currentScore < 0.5) {
      alert("⚠️ 系統無法確認，請靠近一點再紀錄！");
      return;
    }
    
    document.getElementById("status").innerText = "💾 紀錄上傳中...";
    document.getElementById("btn-save").disabled = true;
    
    const requestUrl = `${GAS_URL}?type=river&label=${encodeURIComponent(currentLabel)}&score=${currentScore}`;
    
    fetch(requestUrl, { mode: 'no-cors' })
      .then(() => {
        alert("✅ 垃圾紀錄已成功上傳至試算表！");
        document.getElementById("status").innerText = "✅ 掃描中...";
        document.getElementById("btn-save").disabled = false;
      })
      .catch(error => {
        alert("傳送失敗！");
        document.getElementById("status").innerText = "❌ 傳送失敗";
        document.getElementById("btn-save").disabled = false;
      });
  }
</script>
</body>
</html>
