<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>淡水河 AI 守護者</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; }
    h2 { color: #00d2ff; margin-bottom: 5px; }
    
    /* 替換為原生影片容器 */
    #video-container { 
      width: 280px; height: 280px; margin: 20px auto; border-radius: 20px; 
      overflow: hidden; border: 3px solid #2ecc71; background: #000; 
      box-shadow: 0 0 15px rgba(46, 204, 113, 0.3); position: relative;
    }
    /* 原生影片標籤設定：填滿容器、不鏡像(後置鏡頭) */
    video { width: 100%; height: 100%; object-fit: cover; }
    
    .action-btn { width: 90%; max-width: 300px; padding: 18px; border-radius: 50px; border: none; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin: 10px 0; transition: 0.3s; }
    #btn-init { background: #3498db; }
    #btn-save { background: #e74c3c; display: none; }
    #status { font-size: 16px; color: #f1c40f; margin-top: 10px; min-height: 30px; font-weight: bold; }
    #label-container { margin-top: 10px; font-size: 24px; color: white; font-weight: bold; }
  </style>
</head>
<body>

  <h2>🌊 淡水河 AI 守護者</h2>
  <div id="status">準備就緒，請啟動系統</div>

  <div id="video-container">
    <video id="raw-video" playsinline autoplay muted></video>
  </div>
  
  <div id="label-container">等待辨識...</div>

  <button id="btn-init" class="action-btn" onclick="init()">📸 1. 啟動環境掃描鏡頭</button>
  <button id="btn-save" class="action-btn" onclick="triggerSave()">🚨 2. 紀錄目前畫面垃圾</button>

<script>
  // 🔴 請替換為您「淡水河垃圾辨識」的模型網址
  const MODEL_URL = "https://teachablemachine.withgoogle.com/models/請替換為您的模型ID/";
  
  // 🟢 您的專屬 GAS API 網址 (已填入)
  const GAS_URL = "https://script.google.com/macros/s/AKfycby8s6DKAGqcZqk9_cUyCC-L_vx90AkWX380JZeFXfYLyTG9HWz2yNnBf_JKQ2jR9Gu5/exec";
  
  let model, video, maxPredictions;
  let currentLabel = "", currentScore = 0;

  async function init() {
    const status = document.getElementById("status");
    const btnInit = document.getElementById("btn-init");
    btnInit.innerHTML = "啟動中...";
    btnInit.disabled = true;

    try {
      // 1. 繞過 AI 套件，直接用原生語法呼叫後置主鏡頭
      status.innerText = "1/2 正在請求相機權限...";
      video = document.getElementById("raw-video");
      
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment" }, 
        audio: false 
      });
      video.srcObject = stream;

      // 等待影片串流真實播放
      await new Promise((resolve) => {
        video.onloadedmetadata = () => { video.play(); resolve(); };
      });

      // 2. 鏡頭成功開啟後，再載入 AI 模型
      status.innerText = "2/2 相機已開啟，載入 AI 模型...";
      model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
      maxPredictions = model.getTotalClasses();

      btnInit.style.display = "none";
      document.getElementById("btn-save").style.display = "inline-block";
      status.innerText = "✅ 掃描中，請對準垃圾";
      status.style.color = "#2ecc71";
      
      // 開始辨識
      window.requestAnimationFrame(loop);

    } catch (e) {
      status.innerHTML = `<span style="color:#ff4d4d">❌ 啟動失敗: ${e.name}</span><br>相機無法開啟，請確認 Safari 權限。`;
      btnInit.disabled = false;
      btnInit.innerHTML = "重試啟動";
    }
  }

  async function loop() {
    if (video.readyState >= 2) {
      // 直接把原生影片塞給模型辨識
      const prediction = await model.predict(video);
      let best = prediction.reduce((a, b) => a.probability > b.probability ? a : b);
      
      currentLabel = best.className;
      currentScore = best.probability.toFixed(2);
      
      document.getElementById("label-container").innerText = `${currentLabel} (${(currentScore * 100).toFixed(0)}%)`;
    }
    window.requestAnimationFrame(loop);
  }

  function triggerSave() {
    if (currentScore < 0.6) {
      alert("⚠️ 系統無法確認，請靠近一點再紀錄！");
      return;
    }
    saveRiverData(currentLabel, currentScore);
  }

  function saveRiverData(label, score) {
    document.getElementById("status").innerText = "💾 紀錄上傳中...";
    document.getElementById("btn-save").disabled = true;
    
    const requestUrl = `${GAS_URL}?type=river&label=${encodeURIComponent(label)}&score=${score}`;
    
    fetch(requestUrl, { mode: 'no-cors' })
      .then(() => {
        alert("✅ 垃圾紀錄已成功上傳至試算表！");
        document.getElementById("status").innerText = "✅ 掃描中，請對準垃圾";
        document.getElementById("btn-save").disabled = false;
      })
      .catch(error => {
        alert("傳送失敗！請檢查網路連線。");
        document.getElementById("status").innerText = "❌ 傳送失敗";
        document.getElementById("btn-save").disabled = false;
      });
  }
</script>
</body>
</html>
